<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CodeX</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">EXPLORER</span>
                <div class="sidebar-actions">
                    <button class="sidebar-btn" id="btn-refresh" title="Refresh">&#x21bb;</button>
                </div>
            </div>
            <div id="file-tree" class="file-tree"></div>
        </div>
        <div class="main-content">
            <div id="tabbar" class="tabbar">
                <button class="menu-btn" id="btn-menu">&#9776;</button>
                <div id="tabs-container" class="tabs-container"></div>
                <button class="save-btn" id="btn-save">&#128190;</button>
            </div>
            <div id="editor-container" class="editor-container"></div>
            <div id="statusbar" class="statusbar">
                <div class="status-left">
                    <span class="status-item" id="status-position">Ln 1, Col 1</span>
                    <span class="status-item" id="status-lines">0 lines</span>
                </div>
                <div class="status-right">
                    <span class="status-item" id="status-encoding">UTF-8</span>
                    <span class="status-item" id="status-language">plaintext</span>
                </div>
            </div>
        </div>
        <div id="mobile-helper" class="mobile-helper">
            <div class="helper-row" id="helper-keys"></div>
        </div>
    </div>
    <script src="https://esm.sh/@codemirror/view@6.34.1?bundle" defer></script>
    <script src="https://esm.sh/@codemirror/state@6.4.1?bundle" defer></script>
    <script src="https://esm.sh/@codemirror/commands@6.7.0?bundle" defer></script>
    <script src="https://esm.sh/@codemirror/language@6.10.3?bundle" defer></script>
    <script src="https://esm.sh/@codemirror/autocomplete@6.18.0?bundle" defer></script>
    <script src="https://esm.sh/@codemirror/lang-javascript@6.2.2?bundle" defer></script>
    <script src="https://esm.sh/@codemirror/lang-python@6.1.6?bundle" defer></script>
    <script src="https://esm.sh/@codemirror/lang-cpp@6.0.2?bundle" defer></script>
    <script src="https://esm.sh/@codemirror/lang-html@6.4.9?bundle" defer></script>
    <script src="js/app.js" defer></script>
</body>
</html>
